<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 
    Inline 태그의 특징
    1. 줄바꿈 없음
    2. 너비와 높이가 내용물의 크기에 따라 결정됨
    3. 여백과 패딩은 좌우만 설정 가능

    <span>
    <input>
    -->
    <span>첫 번째</span>
    <span>두 번째</span>
    <span>세 번째</span>
    <span style="width: 200px; height: 50px; background-color: #ffff00">
      높이와 너비 적용 예제 style="width: 200px; height: 50px; background-color: #ffff00" (높이 너비 적용 x)
    </span>
    <a href="#">링크</a>
    <strong>강조</strong>
  </body>
</html>
